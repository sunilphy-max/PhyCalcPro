name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Engineering verification benchmarks
        run: npm run test:verification

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          LICENSE_SIGNING_SECRET: ci-placeholder-secret-min-32-chars-long
          NEXT_PUBLIC_APP_URL: http://localhost:3000
